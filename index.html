    <script>
      // Anti-DarkReader / Force Light Mode Script
      // This script runs immediately to suppress extensions that try to inject dark mode
      (function() {
        const suppress = () => {
          const html = document.documentElement;
          // Remove Dark Reader attributes
          if (html.hasAttribute('data-darkreader-scheme') || html.hasAttribute('data-darkreader-proxy-injected')) {
            const attrs = html.getAttributeNames();
            attrs.forEach(name => {
              if (name.includes('darkreader')) html.removeAttribute(name);
            });
          }
          // Remove Dark Reader injected style tags
          const styles = document.querySelectorAll('style.darkreader, .darkreader--fallback, .darkreader--user-agent');
          styles.forEach(s => s.remove());
        };

        // Monitor for any changes (extensions injecting styles)
        const observer = new MutationObserver(suppress);
        observer.observe(document.documentElement, { 
          attributes: true, 
          childList: true, 
          subtree: true 
        });
        
        // Initial run
        suppress();
        window.addEventListener('DOMContentLoaded', suppress);
      })();
    </script>

    <!-- Google Analytics & Consent Mode v2 -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      window.gtag = gtag; // Expose to global window object for React
      
      // 1. Set default consent to DENIED
      gtag('consent', 'default', {
        'analytics_storage': 'denied',
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'wait_for_update': 500
      });

      // Check for existing consent in localStorage
      try {
        const consent = localStorage.getItem('cookie-consent');
        if (consent === 'granted') {
          console.log('GA: Existing consent found (granted), updating state');
          gtag('consent', 'update', {
            'analytics_storage': 'granted',
            'ad_storage': 'granted',
            'ad_user_data': 'granted',
            'ad_personalization': 'granted'
          });
        }
      } catch (e) {
        console.warn('GA: Could not access localStorage for consent check');
      }

      // 2. Initialize GA
      gtag('js', new Date());
      gtag('config', 'G-90T4169WJP', {
        'send_page_view': false // We handle this manually in React for SPA
      });
      
      console.log('GA Initialized');

      // 3. Defer loading of the actual GTM script to improve page speed
      // Load on first interaction or after 3 seconds
      let gtmLoaded = false;
      function loadGTM() {
        if (gtmLoaded) return;
        gtmLoaded = true;
        var script = document.createElement('script');
        script.src = 'https://www.googletagmanager.com/gtag/js?id=G-90T4169WJP';
        script.async = true;
        document.head.appendChild(script);
        
        // Cleanup listeners
        ['scroll', 'mousemove', 'touchstart', 'keydown'].forEach(function(e) {
          window.removeEventListener(e, loadGTM);
        });
      }

      window.addEventListener('load', function() {
        setTimeout(loadGTM, 3000); // Fallback if no interaction
      });
      
      ['scroll', 'mousemove', 'touchstart', 'keydown'].forEach(function(e) {
        window.addEventListener(e, loadGTM, { once: true, passive: true });
      });
    </script>
