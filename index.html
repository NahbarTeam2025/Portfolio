<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web3 Landing Page</title>
    <link href="https://fonts.bunny.net/css?family=inter:200,300,400,500,600,700&display=swap" rel="stylesheet">
    
    <!-- Performance Optimizations -->
    <link rel="preconnect" href="https://i.imgur.com" crossorigin>
    <link rel="preconnect" href="https://lh3.googleusercontent.com" crossorigin>
    <link rel="preload" as="video" href="https://i.imgur.com/I45w3xZ.mp4" type="video/mp4">
  </head>
  <body>
    <!-- A hidden form for Netlify to parse at build time -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input type="checkbox" name="privacy" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
